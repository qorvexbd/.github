<svg width="680" height="200" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Welcome to Qorvex Open Source</title>
  <desc>Dark tech banner for Qorvex Technology BD open source organization</desc>

  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1e2a40" stroke-width="0.6"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#2563eb;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="200" fill="url(#bgGrad)" rx="12"/>
  <!-- Grid overlay -->
  <rect width="680" height="200" fill="url(#grid)" rx="12" opacity="0.6"/>

  <!-- Corner circuit accents -->
  <g stroke="#1e3a5f" stroke-width="0.8" fill="none">
    <polyline points="24,8 8,8 8,24"/>
    <polyline points="656,8 672,8 672,24"/>
    <polyline points="24,192 8,192 8,176"/>
    <polyline points="656,192 672,192 672,176"/>
  </g>
  <!-- Corner dots -->
  <circle cx="8" cy="8" r="2.5" fill="#2563eb" opacity="0.8"/>
  <circle cx="672" cy="8" r="2.5" fill="#2563eb" opacity="0.8"/>
  <circle cx="8" cy="192" r="2.5" fill="#2563eb" opacity="0.8"/>
  <circle cx="672" cy="192" r="2.5" fill="#2563eb" opacity="0.8"/>

  <!-- Decorative circuit traces -->
  <circle cx="60" cy="45" r="2" fill="#2563eb" opacity="0.4"/>
  <circle cx="620" cy="45" r="2" fill="#2563eb" opacity="0.4"/>
  <circle cx="120" cy="160" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <circle cx="560" cy="160" r="1.5" fill="#3b82f6" opacity="0.3"/>
  <line x1="60" y1="45" x2="100" y2="45" stroke="#1e3a5f" stroke-width="0.6"/>
  <line x1="580" y1="45" x2="620" y2="45" stroke="#1e3a5f" stroke-width="0.6"/>
  <line x1="120" y1="160" x2="160" y2="160" stroke="#1e3a5f" stroke-width="0.6"/>
  <line x1="520" y1="160" x2="560" y2="160" stroke="#1e3a5f" stroke-width="0.6"/>

  <!-- Glow ambient behind text -->
  <rect x="90" y="58" width="500" height="84" fill="url(#glowGrad)" rx="8"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="680" height="3" fill="url(#lineGrad)" rx="2"/>
  <!-- Bottom accent line -->
  <rect x="0" y="197" width="680" height="3" fill="url(#lineGrad)" rx="2"/>

  <!-- OPEN SOURCE tag/badge -->
  <rect x="276" y="55" width="128" height="21" rx="4" fill="#111d38" stroke="#2563eb" stroke-width="0.8"/>
  <text x="340" y="70" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3b82f6" letter-spacing="2.5" font-weight="700">OPEN SOURCE</text>

  <!-- Main heading -->
  <text x="340" y="118" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#eef4ff" letter-spacing="-0.5" filter="url(#softglow)">Welcome to Qorvex</text>

  <!-- Subtitle -->
  <text x="340" y="144" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#5a7ab5" letter-spacing="0.4">Engineering from Rangpur — built for the world</text>

  <!-- Decorative divider with dot -->
  <line x1="275" y1="162" x2="327" y2="162" stroke="#1e3060" stroke-width="0.8"/>
  <circle cx="340" cy="162" r="2" fill="#2563eb" opacity="0.6"/>
  <line x1="353" y1="162" x2="405" y2="162" stroke="#1e3060" stroke-width="0.8"/>

</svg>
